<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 320px; padding: 14px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; }
    h3 { margin: 0 0 4px; font-size: 14px; }
    p.sub { margin: 0 0 10px; font-size: 12px; color: #6b7280; }
    .section { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
    .section:last-of-type { border-bottom: none; }
    .label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    label { display: block; font-size: 12px; color: #374151; font-weight: 600; }
    .badge { font-size: 9px; background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 999px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    input { width: 100%; padding: 7px 9px; font-size: 12px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; font-family: ui-monospace, SFMono-Regular, monospace; }
    button { width: 100%; margin-top: 8px; padding: 7px 9px; font-size: 12px; background: #111; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    button.primary { background: #0d9488; }
    button.primary:hover { background: #0f766e; }
    button.secondary { background: transparent; color: #2563eb; }
    .hint { margin-top: 6px; font-size: 10px; color: #6b7280; }
    .status { margin-top: 10px; font-size: 12px; padding: 6px 8px; border-radius: 4px; }
    .status.ok { background: #ecfdf5; color: #065f46; }
    .status.err { background: #fef2f2; color: #991b1b; }
  </style>
</head>
<body>
  <h3>Sonic Invoices</h3>
  <p class="sub">Quick actions for your store.</p>

  <!-- 🥇 PRIMARY: Paste a product URL -->
  <div class="section">
    <div class="label-row">
      <label for="product-url">🔗 Paste a product URL</label>
      <span class="badge">Quick add</span>
    </div>
    <input id="product-url" type="url" placeholder="https://brand.com/products/example" autocomplete="off" />
    <button id="import-url" class="primary">Import to dashboard →</button>
    <p class="hint">Pulls name, description, price &amp; images, then opens the importer.</p>
  </div>

  <!-- Margin Guardian token (existing) -->
  <div class="section">
    <label for="token">Margin Guardian token</label>
    <input id="token" type="password" placeholder="sgi_..." autocomplete="off" style="margin-top:6px;" />
    <button id="save">Save token</button>
    <button id="open" class="secondary">Open dashboard →</button>
  </div>

  <div id="status" class="status" style="display:none"></div>
  <script src="popup.js"></script>
</body>
</html>
