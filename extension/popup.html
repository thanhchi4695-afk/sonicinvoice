<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 280px; padding: 14px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; }
    h3 { margin: 0 0 4px; font-size: 14px; }
    p.sub { margin: 0 0 12px; font-size: 12px; color: #6b7280; }
    label { display: block; font-size: 12px; margin-bottom: 4px; color: #374151; }
    input { width: 100%; padding: 6px 8px; font-size: 12px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; font-family: ui-monospace, SFMono-Regular, monospace; }
    button { width: 100%; margin-top: 8px; padding: 6px 8px; font-size: 12px; background: #111; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button.secondary { background: transparent; color: #2563eb; }
    .status { margin-top: 10px; font-size: 12px; padding: 6px 8px; border-radius: 4px; }
    .status.ok { background: #ecfdf5; color: #065f46; }
    .status.err { background: #fef2f2; color: #991b1b; }
  </style>
</head>
<body>
  <h3>Sonic Margin Guardian</h3>
  <p class="sub">Paste an extension token from your Sonic Invoices dashboard.</p>
  <label for="token">Extension token</label>
  <input id="token" type="password" placeholder="sgi_..." autocomplete="off" />
  <button id="save">Save token</button>
  <button id="open" class="secondary">Open dashboard →</button>
  <div id="status" class="status" style="display:none"></div>
  <script src="popup.js"></script>
</body>
</html>
