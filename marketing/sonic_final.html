<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sonic Invoices</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:'Inter',system-ui,sans-serif}
#wrap{
  width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#f8fafc;overflow:hidden;
}
canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1}

/* info panel — right side */
#panel{
  position:absolute;right:0;top:0;bottom:0;width:28%;z-index:5;
  display:flex;flex-direction:column;justify-content:center;
  padding:0 2.5% 0 2%;
  pointer-events:none;
}
.panel-inner{
  background:rgba(255,255,255,0.94);
  border:1px solid rgba(226,232,240,0.9);
  border-radius:1.2vw;
  padding:1.6vh 1.6vw;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 24px rgba(0,0,0,0.07);
  transform:translateX(30px);
  opacity:0;
  transition:opacity 0.5s ease, transform 0.5s ease;
}
.panel-inner.show{opacity:1;transform:translateX(0)}
.panel-act{font-size:.65vw;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#94a3b8;margin-bottom:.7vh}
.panel-title{font-size:1.25vw;font-weight:800;color:#0f172a;letter-spacing:-.03em;line-height:1.15;margin-bottom:1vh}
.panel-title span{display:inline-block}
.panel-items{display:flex;flex-direction:column;gap:.55vh}
.panel-item{
  display:flex;align-items:flex-start;gap:.55vw;
  opacity:0;transform:translateX(10px);
  transition:opacity .35s ease, transform .35s ease;
  font-size:.78vw;line-height:1.45;color:#475569;
}
.panel-item.show{opacity:1;transform:translateX(0)}
.panel-dot{width:.55vw;height:.55vw;border-radius:50%;flex-shrink:0;margin-top:.45vh}
.panel-num{
  font-size:1.8vw;font-weight:900;letter-spacing:-.05em;
  margin-top:.8vh;margin-bottom:.2vh;
}
.panel-divider{height:1px;background:#f1f5f9;margin:.8vh 0}

/* wordmark */
#wm{position:absolute;top:2.5%;left:2.5%;z-index:8;display:flex;align-items:center;gap:.55vw;opacity:.7}
#wm svg{width:1.8vw;height:1.8vw}
#wm span{font-size:.85vw;font-weight:700;color:#0f172a;letter-spacing:-.01em}

/* progress + controls */
#prog{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(0,0,0,.06);z-index:20}
#pf{height:100%;width:0%;background:#6366f1;transition:none}
#ctrls{position:absolute;bottom:1.5%;left:50%;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:.8vw;opacity:0;transition:opacity .25s}
#wrap:hover #ctrls{opacity:1}
.cb{background:rgba(255,255,255,.95);border:1px solid rgba(0,0,0,.1);border-radius:20px;padding:.5vh 1.2vw;font-size:.78vw;font-weight:600;color:#334155;cursor:pointer;transition:all .18s;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.cb:hover{background:#fff;box-shadow:0 3px 14px rgba(0,0,0,.15)}
.cb.play{background:#6366f1;color:#fff;border-color:#6366f1;box-shadow:0 4px 14px rgba(99,102,241,.4)}
#acts{display:flex;gap:.35vw;align-items:center}
.adot{width:.45vw;height:.45vw;border-radius:50%;background:rgba(0,0,0,.15);transition:all .3s;cursor:pointer}
.adot.on{background:#6366f1;width:1.1vw;border-radius:.25vw}
.adot.done{background:rgba(99,102,241,.4)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <div id="wm">
    <svg viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" fill="#6366f1" opacity=".15" stroke="#6366f1" stroke-width="1"/>
      <circle cx="20" cy="20" r="11" fill="#6366f1"/>
      <circle cx="16" cy="20" r="5.5" fill="#f8fafc"/>
      <circle cx="21" cy="20" r="3.5" fill="#6366f1"/>
    </svg>
    <span>Sonic Invoices</span>
  </div>

  <div id="panel"><div class="panel-inner" id="panelInner">
    <div class="panel-act" id="pAct"></div>
    <div class="panel-title" id="pTitle"></div>
    <div class="panel-divider"></div>
    <div class="panel-items" id="pItems"></div>
    <div class="panel-num" id="pNum" style="display:none"></div>
  </div></div>

  <div id="prog"><div id="pf"></div></div>
  <div id="ctrls">
    <button class="cb" onclick="nav(-1)">←</button>
    <button class="cb play" id="playBtn" onclick="togglePlay()">▶ Play</button>
    <div id="acts"></div>
    <button class="cb" onclick="nav(1)">→</button>
  </div>
</div>

<script>
/* ─── CANVAS ─────────────────────────────── */
const wrap=document.getElementById('wrap')
const cv=document.getElementById('c')
const ctx=cv.getContext('2d')
let W=0,H=0,DPR=1

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2)
  W=wrap.offsetWidth;H=wrap.offsetHeight
  cv.width=W*DPR;cv.height=H*DPR
  cv.style.width=W+'px';cv.style.height=H+'px'
  ctx.scale(DPR,DPR)
}

/* ─── EASING ─────────────────────────────── */
const E={
  o3:t=>1-Math.pow(1-t,3),
  i3:t=>t*t*t,
  io:t=>t<.5?4*t*t*t:(1-Math.pow(-2*t+2,3)/2),
  el:t=>{const c=2*Math.PI/3;return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-.75)*c)+1},
  bk:t=>{const c=1.70158+1;return c*t*t*t-(c-1)*t*t},
}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function ease(t,fn=E.o3){return fn(clamp(t,0,1))}
function cx(f){return W*f}
function cy(f){return H*f}
function cs(f){return Math.min(W,H)*f}

/* ─── COLOURS ────────────────────────────── */
const C={
  bg:'#f8fafc',ink:'#0f172a',muted:'#94a3b8',border:'#e2e8f0',
  indigo:'#6366f1',violet:'#8b5cf6',green:'#10b981',
  amber:'#f59e0b',red:'#ef4444',teal:'#14b8a6',
  pink:'#ec4899',blue:'#3b82f6',sky:'#0ea5e9',
  greenL:'#f0fdf4',redL:'#fef2f2',indigoL:'#eef2ff',
}

/* ─── STATE ──────────────────────────────── */
let t=0,playing=false,lastTs=null,rafId=null
const ACT_DUR=11
const ACTS=10
let globalT=0,actT=0,actIdx=0

/* ─── PRIMITIVES ─────────────────────────── */
function rr(x,y,w,h,r,fill,stroke,sw=1){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r)
  if(fill){ctx.fillStyle=fill;ctx.fill()}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke()}
}
function circ(x,y,r,fill,stroke,sw=1.5){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2)
  if(fill){ctx.fillStyle=fill;ctx.fill()}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke()}
}
function ring(x,y,r,color,alpha,sw=2){
  ctx.save();ctx.globalAlpha=alpha
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2)
  ctx.strokeStyle=color;ctx.lineWidth=sw;ctx.stroke()
  ctx.restore()
}
function txt(x,y,s,size,color,weight='600',align='center',baseline='middle'){
  ctx.save()
  ctx.font=`${weight} ${size}px 'Inter',system-ui,sans-serif`
  ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline=baseline
  ctx.fillText(s,x,y);ctx.restore()
}
function label(x,y,s,size,color,bg,alpha=1){
  ctx.save();ctx.globalAlpha=alpha
  ctx.font=`600 ${size}px 'Inter',system-ui,sans-serif`
  const m=ctx.measureText(s).width
  const pad=size*.55,ph=size*1.5
  rr(x-m/2-pad,y-ph/2,m+pad*2,ph,ph/2,bg,color+'44',1)
  ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle'
  ctx.fillText(s,x,y);ctx.restore()
}

/* ─── PARTICLES ──────────────────────────── */
let parts=[]
function spawn(x,y,col,vx,vy,life=.9,r=cs(.006)){
  parts.push({x,y,vx,vy,r,col,life,ml:life,t:0})
}
function tickParts(dt){
  parts=parts.filter(p=>{
    p.t+=dt;p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=.25*dt*60
    const a=ease(1-p.t/p.ml)
    ctx.save();ctx.globalAlpha=a*.75
    circ(p.x,p.y,p.r*a,p.col);ctx.restore()
    return p.t<p.ml
  })
}

/* ─── SONIC LOGO ─────────────────────────── */
function sonic(x,y,r,alpha=1,col=C.indigo){
  ctx.save();ctx.globalAlpha=alpha
  ring(x,y,r,col,.12,r*.11);ring(x,y,r*.66,col,.2,r*.08)
  ctx.beginPath();ctx.arc(x,y,r*.5,0,Math.PI*2)
  ctx.fillStyle=col;ctx.fill()
  ctx.globalCompositeOperation='destination-out'
  ctx.beginPath();ctx.arc(x-r*.17,y,r*.27,0,Math.PI*2);ctx.fill()
  ctx.globalCompositeOperation='source-over'
  ctx.beginPath();ctx.arc(x+r*.1,y,r*.21,0,Math.PI*2)
  ctx.fillStyle=col;ctx.fill()
  ctx.restore()
}

/* ─── DOCUMENT ───────────────────────────── */
function doc(x,y,w,h,r,alpha=1,fill=C.bg,stroke=C.border){
  ctx.save();ctx.globalAlpha=alpha
  const fold=w*.2
  ctx.beginPath()
  ctx.moveTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y)
  ctx.lineTo(x+w-fold,y);ctx.lineTo(x+w,y+fold)
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r)
  ctx.closePath();ctx.fillStyle=fill;ctx.fill()
  ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke()
  ctx.beginPath()
  ctx.moveTo(x+w-fold,y);ctx.lineTo(x+w-fold,y+fold);ctx.lineTo(x+w,y+fold)
  ctx.lineWidth=1;ctx.stroke();ctx.restore()
}

/* ─── CLOCK ──────────────────────────────── */
function clock(x,y,r,ha,ma,alpha=1,col=C.ink){
  ctx.save();ctx.globalAlpha=alpha
  circ(x,y,r,null,col,r*.08)
  ;[{a:ha,l:.5,lw:r*.12},{a:ma,l:.74,lw:r*.08}].forEach(h=>{
    ctx.beginPath();ctx.moveTo(x,y)
    ctx.lineTo(x+Math.cos(h.a)*r*h.l,y+Math.sin(h.a)*r*h.l)
    ctx.strokeStyle=col;ctx.lineWidth=h.lw;ctx.lineCap='round';ctx.stroke()
  })
  circ(x,y,r*.1,col);ctx.restore()
}

/* ─── ICON DRAWER ────────────────────────── */
function icon(x,y,size,col,alpha,shape){
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=col
  ctx.lineWidth=size*.09;ctx.lineCap='round';ctx.lineJoin='round'
  ctx.translate(x,y);ctx.scale(size/24,size/24);ctx.translate(-12,-12)
  ctx.beginPath()
  const sh={
    mail:()=>{ctx.roundRect(2,4,20,16,2);ctx.moveTo(2,7);ctx.lineTo(12,13);ctx.lineTo(22,7)},
    file:()=>{ctx.moveTo(6,2);ctx.lineTo(14,2);ctx.lineTo(18,6);ctx.lineTo(18,22);ctx.lineTo(6,22);ctx.closePath();ctx.moveTo(14,2);ctx.lineTo(14,7);ctx.lineTo(18,7)},
    cart:()=>{ctx.moveTo(1,1);ctx.lineTo(5,1);ctx.lineTo(8,14);ctx.lineTo(19,14);ctx.lineTo(21,5);ctx.lineTo(6,5);ctx.moveTo(9,19);ctx.arc(9,19,1.5,0,Math.PI*2);ctx.moveTo(18,19);ctx.arc(18,19,1.5,0,Math.PI*2)},
    link:()=>{ctx.moveTo(10,13);ctx.bezierCurveTo(12,15,16,15,18,13);ctx.moveTo(14,11);ctx.bezierCurveTo(12,9,8,9,6,11);ctx.moveTo(15,9);ctx.lineTo(20,4);ctx.moveTo(9,15);ctx.lineTo(4,20)},
    tag:()=>{ctx.moveTo(3,3);ctx.lineTo(10,3);ctx.lineTo(21,14);ctx.lineTo(14,21);ctx.lineTo(3,10);ctx.closePath()},
    check:()=>{ctx.moveTo(20,6);ctx.lineTo(9,17);ctx.lineTo(4,12)},
    shopify:()=>{ctx.moveTo(16,3);ctx.bezierCurveTo(14,2,12,2,10,3);ctx.lineTo(8,19);ctx.lineTo(17,21);ctx.lineTo(21,5);ctx.bezierCurveTo(19,4,16,3,16,3);ctx.moveTo(8,8);ctx.lineTo(4,10);ctx.lineTo(4,19);ctx.lineTo(8,21)},
    search:()=>{ctx.arc(11,11,7,0,Math.PI*2);ctx.moveTo(16,16);ctx.lineTo(21,21)},
    clock:()=>{ctx.arc(12,12,9,0,Math.PI*2);ctx.moveTo(12,7);ctx.lineTo(12,12);ctx.lineTo(16,14)},
    brain:()=>{ctx.moveTo(12,5);ctx.bezierCurveTo(8,5,6,8,6,11);ctx.bezierCurveTo(4,11,2,13,2,15);ctx.bezierCurveTo(2,17,4,19,7,19);ctx.lineTo(17,19);ctx.bezierCurveTo(20,19,22,17,22,15);ctx.bezierCurveTo(22,13,20,11,18,11);ctx.bezierCurveTo(18,8,16,5,12,5);ctx.moveTo(12,5);ctx.lineTo(12,19)},
    refresh:()=>{ctx.arc(12,12,8,-.3,Math.PI*1.7);ctx.moveTo(20,8);ctx.lineTo(21,12);ctx.lineTo(17,13)},
    trending:()=>{ctx.moveTo(2,20);ctx.lineTo(8,12);ctx.lineTo(14,16);ctx.lineTo(22,5);ctx.moveTo(16,5);ctx.lineTo(22,5);ctx.lineTo(22,11)},
    star:()=>{for(let j=0;j<5;j++){const a=-Math.PI/2+j*Math.PI*2/5;const a2=a+Math.PI/5;ctx.moveTo(12+Math.cos(a)*9,12+Math.sin(a)*9);ctx.lineTo(12+Math.cos(a2)*4,12+Math.sin(a2)*4)}},
    photo:()=>{ctx.roundRect(2,4,20,16,2);ctx.arc(12,12,4,0,Math.PI*2);ctx.moveTo(16,4);ctx.lineTo(18,4)},
    mail2:()=>{ctx.roundRect(2,4,20,16,2);ctx.moveTo(2,7);ctx.lineTo(12,13);ctx.lineTo(22,7);ctx.moveTo(12,13);ctx.lineTo(12,20)},
    keyboard:()=>{ctx.roundRect(2,6,20,14,2);ctx.moveTo(6,11);ctx.lineTo(6,11);ctx.rect(5,10,2,2);ctx.rect(9,10,2,2);ctx.rect(13,10,2,2);ctx.rect(17,10,2,2);ctx.rect(7,14,10,2)},
    alert:()=>{ctx.moveTo(12,2);ctx.lineTo(22,20);ctx.lineTo(2,20);ctx.closePath();ctx.moveTo(12,9);ctx.lineTo(12,13);ctx.moveTo(12,17);ctx.arc(12,17,.5,0,Math.PI*2)},
  }
  if(sh[shape])sh[shape]()
  ctx.stroke();ctx.restore()
}

/* ─── PANEL SYSTEM ───────────────────────── */
const panelData=[
  // Act 0 — PROBLEM
  {

    col:C.red,

  },

  {

    col:C.indigo,

  {

let panelVisible=false
function showPanel(idx){
  const d=panelData[idx]
  const pi=document.getElementById('panelInner')
  document.getElementById('pAct').textContent=d.act
  document.getElementById('pTitle').textContent=d.title
  document.getElementById('pTitle').style.color=d.col
  const pItems=document.getElementById('pItems')
  pItems.innerHTML=''
  d.items.forEach((item,i)=>{
    const div=document.createElement('div')
    div.className='panel-item'
    div.innerHTML=`<div class="panel-dot" style="background:${d.col}"></div><span>${item}</span>`
    div.style.transitionDelay=`${.12+i*.09}s`
    pItems.appendChild(div)
  })
  const pNum=document.getElementById('pNum')
  if(d.num){
    pNum.style.display='block'
    pNum.style.color=d.col
    pNum.innerHTML=`${d.num.val}<span style="font-size:.75vw;font-weight:500;color:#94a3b8;margin-left:.4vw">${d.num.sub}</span>`
  } else {pNum.style.display='none'}

  // trigger animation
  setTimeout(()=>{
    pi.classList.add('show')
    pItems.querySelectorAll('.panel-item').forEach(el=>setTimeout(()=>el.classList.add('show'),10))
  },80)
}

function hidePanel(){
  const pi=document.getElementById('panelInner')
  pi.classList.remove('show')
  document.querySelectorAll('.panel-item').forEach(el=>el.classList.remove('show'))
}

/* ─── BACKGROUND ─────────────────────────── */
function clearBG(){
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H)
  ctx.save()
  const gs=cs(.038)
  for(let gx=gs*.5;gx<W*.72;gx+=gs)
    for(let gy=gs*.5;gy<H;gy+=gs)
      circ(gx,gy,cs(.0018),'rgba(99,102,241,0.1)')
  ctx.restore()
}

/* ─── ACTS ───────────────────────────────── */

/* ACT 0 — PROBLEM */
function act0(p){
  const dW=cs(.055),dH=cs(.068)
  const pos=[{x:.18,y:.32},{x:.38,y:.26},{x:.55,y:.38},{x:.25,y:.56},{x:.48,y:.62},{x:.12,y:.65}]
  pos.forEach((ps,i)=>{
    const dp=ease(clamp((p-i*.12)/(1-i*.12),0,1),E.o3)
    const y=lerp(cy(-.12),cy(ps.y),dp)
    const a=ease(clamp((p-i*.12)/(1-i*.12),0,1))
    const x_=cx(ps.x)
    doc(x_-dW/2,y-dH/2,dW,dH,cs(.008),a)
    if(a>.3){
      ctx.save();ctx.globalAlpha=a*.45
      ;[.28,.44,.6].forEach(ly=>rr(x_-dW*.33,y-dH/2+dH*ly,dW*.66,cs(.003),1,C.border))
      ctx.restore()
    }
  })
  // manual typing hand icon centre
  if(p>.25){

  }
  if(p>.42){
    const np=ease((p-.42)/.58,E.el)
    const hx=cx(.5)
    ctx.save();ctx.globalAlpha=np*.12
    txt(hx,cy(.78),'87%',cs(.18),C.indigo,'900')
    ctx.restore()
    txt(hx,cy(.78),'87%',cs(.13)*np,C.indigo,'900')
    txt(hx,cy(.86),'time saved',cs(.018)*np,C.muted,'500')
  }
  if(p>.68){
    const fp=ease((p-.68)/.32,E.o3)
    sonic(cx(.5),cy(.22),cs(.065)*fp,fp)
    ;[0,.32,.64].forEach(off=>{
      const rp=((fp+off)%1)
      ring(cx(.5),cy(.22),cs(.065)*fp+cs(.11)*rp,C.indigo,(1-rp)*.32*fp,2)
    })
    // website
    const wa=ease(clamp((p-.82)/.18,0,1))
    label(cx(.5),cy(.32),'sonicinvoices.com',cs(.015),C.indigo,C.indigo+'18',wa)
  }
  if(p>.55){
    const cp=ease((p-.55)/.45)
    if(Math.random()<cp*.35){
      const cols=[C.green,C.indigo,C.amber,C.teal,C.violet]
      spawn(cx(.5)+(Math.random()-.5)*cx(.5),cy(.82),
        cols[Math.floor(Math.random()*cols.length)],
        (Math.random()-.5)*2.5,-(Math.random()*3.5+1.5),.8+Math.random()*.4)
    }
  }
}

/* ─── DRAW FNS ───────────────────────────── */
const FNS=[act0,act1,act2,act3,act4,act5,act6,act7,act8,act9]

/* ─── ACT DOTS ───────────────────────────── */
const actsEl=document.getElementById('acts')
for(let i=0;i<ACTS;i++){
  const d=document.createElement('div')
  d.className='adot';d.id='dot'+i
  d.onclick=()=>goTo(i)
  actsEl.appendChild(d)
}
function updateDots(){
  for(let i=0;i<ACTS;i++){
    const d=document.getElementById('dot'+i)
    d.className='adot'+(i===actIdx?' on':i<actIdx?' done':'')
  }
}

/* ─── RENDER LOOP ────────────────────────── */
function render(ts){
  if(!lastTs)lastTs=ts
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts
  if(playing){
    t+=dt
    const raw=t/(ACT_DUR*ACTS)
    globalT=clamp(raw,0,1)
    const newAct=Math.min(Math.floor(raw*ACTS),ACTS-1)
    if(newAct!==actIdx){
      hidePanel()
      actIdx=newAct
      setTimeout(()=>showPanel(actIdx),420)
    }
    actT=clamp((raw*ACTS)%1,0,1)
    document.getElementById('pf').style.width=(globalT*100)+'%'
    updateDots()
    if(globalT>=1){playing=false;document.getElementById('playBtn').textContent='↺ Replay';t=0}
  }
  ctx.clearRect(0,0,W,H);clearBG();tickParts(dt)
  const FADE=.06
  if(actT<FADE&&actIdx>0){
    ctx.save();ctx.globalAlpha=ease(1-actT/FADE)
    FNS[actIdx-1](1);ctx.restore()
    ctx.save();ctx.globalAlpha=ease(actT/FADE)
    FNS[actIdx](0);ctx.restore()
  } else FNS[actIdx](actT)
  rafId=requestAnimationFrame(render)
}

/* ─── NAV ────────────────────────────────── */
function goTo(idx){
  hidePanel()
  actIdx=idx
  actT=0
  t=idx*ACT_DUR
  updateDots()
  setTimeout(()=>showPanel(actIdx),400)
}
function nav(d){
  const n=actIdx+d
  if(n>=0&&n<ACTS)goTo(n)
}
function togglePlay(){
  if(playing){
    playing=false
    document.getElementById('playBtn').textContent='▶ Play'
  } else {
    if(t>=ACT_DUR*ACTS-.5)t=0
    playing=true
    document.getElementById('playBtn').textContent='❙❙ Pause'
    lastTs=null
  }
}

/* ─── INIT ───────────────────────────────── */
window.addEventListener('load',()=>{
  resize();updateDots()
  clearBG();FNS[0](0)
  showPanel(0)
  requestAnimationFrame(render)
})
window.addEventListener('resize',()=>{resize();ctx.clearRect(0,0,W,H);clearBG()})
</script>
