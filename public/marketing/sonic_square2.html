<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Sonic Invoices</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#111;overflow:hidden;font-family:'Inter',system-ui,sans-serif}
#wrap{
  width:min(100vw,100vh);height:min(100vw,100vh);
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#f9fafb;overflow:hidden;
}
canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1}
/* top-left brand mark — tiny, always present */
#brand{position:absolute;top:3.5%;left:4%;z-index:9;display:flex;align-items:center;gap:1.8%;opacity:.55}
#brand svg{width:5.5%;height:5.5%;min-width:18px;min-height:18px}
#brand span{font-size:2.6%;font-weight:700;color:#0f172a;letter-spacing:-.02em;white-space:nowrap}
/* step label — top right, colour coded */
#steplbl{position:absolute;top:3.5%;right:4%;z-index:9;font-size:2.2%;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#94a3b8;transition:color .4s}
/* progress strip */
#prog{position:absolute;top:0;left:0;right:0;height:3px;z-index:20;background:rgba(0,0,0,.06)}
#pf{height:100%;width:0%;background:linear-gradient(90deg,#6366f1,#8b5cf6,#10b981);transition:none}
/* dots */
#dots{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);z-index:9;display:flex;gap:1.4%;align-items:center}
.dot{width:1.4%;aspect-ratio:1;min-width:5px;border-radius:50%;background:rgba(0,0,0,.13);transition:all .3s;cursor:pointer}
.dot.on{background:#6366f1;width:3.8%;border-radius:.8%;min-width:14px}
.dot.done{background:rgba(99,102,241,.4)}
/* play */
#play{
  position:absolute;bottom:10%;left:50%;transform:translateX(-50%);
  z-index:20;background:rgba(255,255,255,.96);border:1px solid rgba(0,0,0,.1);
  border-radius:30px;padding:2% 8%;font-size:3%;font-weight:700;
  color:#334155;cursor:pointer;font-family:inherit;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.13);display:flex;align-items:center;gap:1.8%;
}
#play.h{opacity:0;pointer-events:none}
#play:active{transform:translateX(-50%) scale(.97)}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="brand">
  <svg viewBox="0 0 36 36" fill="none">
    <circle cx="18" cy="18" r="16" fill="#6366f1" opacity=".12" stroke="#6366f1" stroke-width="1.1"/>
    <circle cx="18" cy="18" r="10" fill="#6366f1"/>
    <circle cx="15" cy="18" r="5" fill="#f9fafb"/>
    <circle cx="19.5" cy="18" r="3.2" fill="#6366f1"/>
  </svg>
  <span>Sonic Invoices</span>
</div>
<div id="steplbl"></div>
<div id="prog"><div id="pf"></div></div>
<div id="dots"></div>
<button id="play" onclick="togglePlay()">▶ &nbsp;Play</button>
</div>

<script>
/* ─── CANVAS ─────────────────────────────── */
const wrap=document.getElementById('wrap')
const cv=document.getElementById('c')
const ctx=cv.getContext('2d')
let Q=0,DPR=1   // Q = side of square

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2)
  Q=wrap.offsetWidth
  cv.width=Q*DPR; cv.height=Q*DPR
  cv.style.width=Q+'px'; cv.style.height=Q+'px'
  ctx.scale(DPR,DPR)
}

/* ─── MATH ─────────────────────────────── */
const cl=(v,a,b)=>Math.max(a,Math.min(b,v))
const lr=(a,b,t)=>a+(b-a)*t
const E={
  o3: t=>1-Math.pow(1-t,3),
  el: t=>{const c=2*Math.PI/3;return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-.75)*c)+1},
  io: t=>t<.5?4*t*t*t:(1-Math.pow(-2*t+2,3)/2),
  o2: t=>1-(1-t)*(1-t),
  bk: t=>(2.618)*t*t*t-1.618*t*t,
}
function ease(t,fn=E.o3){return fn(cl(t,0,1))}
const q=f=>Q*f   // fraction of square side
const π=Math.PI

/* ─── COLOURS ─────────────────────────── */
const C={
  bg:'#f9fafb',
  I:'#6366f1', Iv:'#8b5cf6',   // indigo / violet
  G:'#10b981', Gt:'#14b8a6',   // green / teal
  A:'#f59e0b', Ao:'#f97316',   // amber / orange
  P:'#ec4899', Pr:'#ef4444',   // pink / red
  B:'#3b82f6', Bs:'#0ea5e9',   // blue / sky
  K:'#0f172a', M:'#94a3b8',    // ink / muted
  Bo:'#e2e8f0',                 // border
}

/* ─── PRIMITIVES ──────────────────────── */
function arc(x,y,r,fill,stroke,sw=1.5){
  ctx.beginPath();ctx.arc(x,y,r,0,2*π)
  if(fill){ctx.fillStyle=fill;ctx.fill()}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke()}
}
function rrect(x,y,w,h,r,fill,stroke,sw=1.2){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r)
  if(fill){ctx.fillStyle=fill;ctx.fill()}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke()}
}
function ring(x,y,r,col,a,sw=1.5){
  ctx.save();ctx.globalAlpha=a;ctx.beginPath();ctx.arc(x,y,r,0,2*π)
  ctx.strokeStyle=col;ctx.lineWidth=sw;ctx.stroke();ctx.restore()
}
function line(x1,y1,x2,y2,col,sw,dash=[]){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=sw;ctx.lineCap='round'
  ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2)
  ctx.stroke();ctx.setLineDash([]);ctx.restore()
}
function arrow(x1,y1,x2,y2,col,sw,pg=1){
  const dx=x2-x1,dy=y2-y1,ex=x1+dx*pg,ey=y1+dy*pg
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=sw;ctx.lineCap='round'
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(ex,ey);ctx.stroke()
  if(pg>.78){
    const a=Math.atan2(dy,dx),hs=q(.02)
    ctx.beginPath()
    ctx.moveTo(ex-Math.cos(a-π/6)*hs,ey-Math.sin(a-π/6)*hs)
    ctx.lineTo(ex,ey)
    ctx.lineTo(ex-Math.cos(a+π/6)*hs,ey-Math.sin(a+π/6)*hs)
    ctx.stroke()
  }
  ctx.restore()
}
function num(x,y,s,sz,col,wt='700',a=1){
  ctx.save();ctx.globalAlpha=a
  ctx.font=`${wt} ${sz}px 'Inter',system-ui,sans-serif`
  ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle'
  ctx.fillText(s,x,y);ctx.restore()
}
function chip(x,y,s,sz,col,a=1){
  ctx.save();ctx.globalAlpha=a
  ctx.font=`600 ${sz}px 'Inter',system-ui,sans-serif`
  const w=ctx.measureText(s).width,px=sz*.65,ph=sz*1.55
  rrect(x-w/2-px,y-ph/2,w+px*2,ph,ph/2,col+'1a',col+'55',.9)
  ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle'
  ctx.fillText(s,x,y);ctx.restore()
}

/* ─── SONIC LOGO ──────────────────────── */
function sonic(x,y,r,a=1,col=C.I){
  ctx.save();ctx.globalAlpha=a
  arc(x,y,r,col)
  ctx.globalCompositeOperation='destination-out'
  arc(x-r*.17,y,r*.27,C.K)
  ctx.globalCompositeOperation='source-over'
  arc(x+r*.1,y,r*.2,col)
  ctx.restore()
}
function sonicRings(x,y,r,t2,col=C.I,a=1){
  ;[0,.32,.64].forEach(off=>{
    const rp=((t2*.8+off)%1)
    ring(x,y,r+q(.09)*rp,col,(1-rp)*.18*a,2)
  })
}

/* ─── DOCUMENT ────────────────────────── */
function doc(x,y,w,h,a=1,fill='#fff',stroke=C.Bo){
  ctx.save();ctx.globalAlpha=a
  const fold=w*.2,r=w*.07
  ctx.beginPath()
  ctx.moveTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y)
  ctx.lineTo(x+w-fold,y);ctx.lineTo(x+w,y+fold)
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r)
  ctx.closePath();ctx.fillStyle=fill;ctx.fill()
  ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke()
  ctx.beginPath();ctx.moveTo(x+w-fold,y);ctx.lineTo(x+w-fold,y+fold);ctx.lineTo(x+w,y+fold)
  ctx.lineWidth=1;ctx.stroke()
  ;[.3,.46,.62].forEach(f=>rrect(x+w*.12,y+h*f,w*.7,h*.055,1,stroke+'33'))
  ctx.restore()
}

/* ─── ENVELOPE ────────────────────────── */
function env(x,y,w,h,a=1,col=C.A){
  ctx.save();ctx.globalAlpha=a
  rrect(x,y,w,h,w*.07,col+'1a',col,1.5)
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round'
  ctx.beginPath();ctx.moveTo(x,y+h*.08);ctx.lineTo(x+w/2,y+h*.58);ctx.lineTo(x+w,y+h*.08)
  ctx.stroke()
  ctx.restore()
}

/* ─── HEXAGON (AI) ───────────────────── */
function hex(x,y,r,rot,a=1,col=C.I){
  ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.rotate(rot)
  ctx.beginPath()
  for(let i=0;i<6;i++){const ag=i*π/3-π/6;i===0?ctx.moveTo(Math.cos(ag)*r,Math.sin(ag)*r):ctx.lineTo(Math.cos(ag)*r,Math.sin(ag)*r)}
  ctx.closePath();ctx.fillStyle=col+'18';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke()
  // inner spark
  const sr=r*.38
  ctx.beginPath()
  for(let i=0;i<8;i++){const ag=i*π/4,rr=i%2===0?sr:sr*.38;i===0?ctx.moveTo(Math.cos(ag)*rr,Math.sin(ag)*rr):ctx.lineTo(Math.cos(ag)*rr,Math.sin(ag)*rr)}
  ctx.closePath();ctx.fillStyle=col;ctx.fill()
  ctx.restore()
}

/* ─── CYLINDER (DB) ──────────────────── */
function cyl(x,y,w,h,col,a=1){
  ctx.save();ctx.globalAlpha=a
  const ry=h*.2
  rrect(x-w/2,y-h/2,w,h,0,col+'18',col,.9)
  ctx.beginPath();ctx.ellipse(x,y-h/2,w/2,ry,0,0,2*π)
  ctx.fillStyle=col+'28';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=.9;ctx.stroke()
  ctx.beginPath();ctx.ellipse(x,y+h/2,w/2,ry,0,0,π)
  ctx.strokeStyle=col;ctx.lineWidth=.9;ctx.stroke()
  ctx.restore()
}

/* ─── DIAMOND ────────────────────────── */
function diamond(x,y,w,h,col,a=1){
  ctx.save();ctx.globalAlpha=a
  ctx.beginPath()
  ctx.moveTo(x,y-h/2);ctx.lineTo(x+w/2,y);ctx.lineTo(x,y+h/2);ctx.lineTo(x-w/2,y)
  ctx.closePath();ctx.fillStyle=col+'1c';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke()
  ctx.restore()
}

/* ─── BAG ────────────────────────────── */
function bag(x,y,w,h,col,a=1){
  ctx.save();ctx.globalAlpha=a
  rrect(x-w/2,y,w,h,w*.1,col+'1a',col,2)
  ctx.beginPath();ctx.arc(x,y,w*.35,π,0)
  ctx.strokeStyle=col;ctx.lineWidth=w*.1;ctx.lineCap='round';ctx.stroke()
  ctx.restore()
}

/* ─── STAR BURST ─────────────────────── */
function burst(x,y,r,n,col,a=1,rot=0){
  ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.rotate(rot)
  ctx.beginPath()
  for(let i=0;i<n*2;i++){
    const ag=i*π/n,rr=i%2===0?r:r*.42
    i===0?ctx.moveTo(Math.cos(ag)*rr,Math.sin(ag)*rr):ctx.lineTo(Math.cos(ag)*rr,Math.sin(ag)*rr)
  }
  ctx.closePath();ctx.fillStyle=col;ctx.fill();ctx.restore()
}

/* ─── EYE ────────────────────────────── */
function eye(x,y,w,openFrac,col,a=1){
  const h=w*.42
  ctx.save();ctx.globalAlpha=a
  // white of eye
  ctx.beginPath();ctx.ellipse(x,y,w/2,h/2*openFrac,0,0,2*π)
  ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke()
  // pupil
  if(openFrac>.35){
    arc(x,y,w*.15,col)
    arc(x+w*.06,y-w*.04,w*.05,'#fff')
  }
  ctx.restore()
}

/* ─── ROCKET ─────────────────────────── */
function rocket(x,y,sz,a=1){
  ctx.save();ctx.globalAlpha=a;ctx.translate(x,y)
  // body
  ctx.beginPath();ctx.ellipse(0,0,sz*.28,sz*.52,0,0,2*π);ctx.fillStyle=C.I;ctx.fill()
  // nose
  ctx.beginPath();ctx.moveTo(0,-sz*.52);ctx.lineTo(-sz*.2,0);ctx.lineTo(sz*.2,0);ctx.closePath()
  ctx.fillStyle=C.Iv;ctx.fill()
  // fins
  ;[[-1],[1]].forEach(([s])=>{
    ctx.beginPath();ctx.moveTo(s*sz*.2,sz*.22);ctx.lineTo(s*sz*.44,sz*.52);ctx.lineTo(s*sz*.2,sz*.42);ctx.closePath()
    ctx.fillStyle=C.Iv;ctx.fill()
  })
  // flame
  arc(0,sz*.62,sz*.17,C.A+'cc')
  arc(0,sz*.72,sz*.09,C.Ao+'99')
  ctx.restore()
}

/* ─── CHECKMARK ──────────────────────── */
function check(x,y,sz,col,a=1){
  ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=col;ctx.lineWidth=sz*.22;ctx.lineCap='round';ctx.lineJoin='round'
  ctx.beginPath();ctx.moveTo(x-sz*.38,y);ctx.lineTo(x-sz*.08,y+sz*.32);ctx.lineTo(x+sz*.42,y-sz*.35)
  ctx.stroke();ctx.restore()
}

/* ─── X MARK ─────────────────────────── */
function xmark(x,y,sz,col,a=1){
  ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=col;ctx.lineWidth=sz*.2;ctx.lineCap='round'
  ctx.beginPath();ctx.moveTo(x-sz*.35,y-sz*.35);ctx.lineTo(x+sz*.35,y+sz*.35);ctx.stroke()
  ctx.beginPath();ctx.moveTo(x+sz*.35,y-sz*.35);ctx.lineTo(x-sz*.35,y+sz*.35);ctx.stroke()
  ctx.restore()
}

/* ─── ORBIT ──────────────────────────── */
function orbit(x,y,r,count,t2,col,a=1){
  ctx.save();ctx.globalAlpha=a
  ring(x,y,r,col,.12,1)
  for(let i=0;i<count;i++){
    const ag=t2*2.2+i*2*π/count
    arc(x+Math.cos(ag)*r,y+Math.sin(ag)*r*.7,r*.1,col)
  }
  ctx.restore()
}

/* ─── FLOW PARTICLE ──────────────────── */
function fp(x1,y1,x2,y2,t2,col,r=q(.014)){
  const ft=t2%1,x=lr(x1,x2,ft),y=lr(y1,y2,ft)
  const fa=ft<.14?ft/.14:ft>.82?(1-ft)/.18:1
  ctx.save();ctx.globalAlpha=fa*.88;arc(x,y,r,col)
  for(let i=1;i<=3;i++){
    const bt=Math.max(0,ft-i*.05)
    ctx.globalAlpha=fa*(4-i)*.09
    arc(lr(x1,x2,bt),lr(y1,y2,bt),r*(4-i)/4,col)
  }
  ctx.restore()
}

/* ─── PARTICLES ──────────────────────── */
let pts=[]
function pt(x,y,col,vx,vy,life=.75){pts.push({x,y,vx,vy,r:q(.009),col,l:life,ml:life,t:0})}
function tickPts(dt){
  pts=pts.filter(p=>{
    p.t+=dt;p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=.14*dt*60
    const a=ease(1-p.t/p.ml)
    ctx.save();ctx.globalAlpha=a*.7;arc(p.x,p.y,p.r*a,p.col);ctx.restore()
    return p.t<p.ml
  })
}

/* ─── BG GRID ────────────────────────── */
function bg(){
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,Q,Q)
  ctx.save()
  const gs=q(.055)
  for(let gx=gs/2;gx<Q;gx+=gs)
    for(let gy=gs/2;gy<Q;gy+=gs)
      arc(gx,gy,q(.0018),'rgba(99,102,241,.07)')
  ctx.restore()
}

/* ═══════════════════════════════════════
   GLOBAL TIME
═══════════════════════════════════════ */
let T=0          // global elapsed seconds
let playing=false,lastTs=null
const DUR=15     // seconds per act
const N=8
let gT=0,aT=0,aI=0

/* ═══════════════════════════════════════
   ACT 0 — TRIGGER
   Three sources (doc / envelope / hand-cursor) float from
   edges, trail comet-tails, converge into the Sonic hub.
   Big "3" counts the inputs.
═══════════════════════════════════════ */
function a0(p){
  const cx=q(.5),cy=q(.5)

  // Sonic hub grows
  const hr=q(.11)*ease(p*.72,E.el)
  sonicRings(cx,cy,hr,T,C.I,ease(p*.72))
  sonic(cx,cy,hr,ease(p*.72))

  // 3 source symbols
  const src=[
    // [draw, colour, start-angle, start-frac]
    {fn:(x,y,s,a)=>doc(x-s/2,y-s*.62,s,s*.78,a,C.Iv+'18',C.Iv), c:C.Iv, ang:-π*.7},
    {fn:(x,y,s,a)=>env(x-s/2,y-s*.36,s,s*.58,a,C.A),             c:C.A,  ang:π/2},
    {fn:(x,y,s,a)=>{
      // cursor arrow symbol
      ctx.save();ctx.globalAlpha=a;ctx.fillStyle=C.Gt;ctx.strokeStyle=C.Gt;ctx.lineWidth=s*.06
      ctx.beginPath();ctx.moveTo(x,y-s*.45);ctx.lineTo(x,y+s*.3);ctx.lineTo(x+s*.18,y+s*.05);ctx.lineTo(x+s*.35,y+s*.45);ctx.lineTo(x+s*.45,y+s*.35);ctx.lineTo(x+s*.28,y-.01);ctx.lineTo(x+s*.45,y-.12);ctx.closePath()
      ctx.fill();ctx.stroke();ctx.restore()
    }, c:C.Gt, ang:π*1.72},
  ]

  src.forEach((s,i)=>{
    const del=i*.17
    const sp=cl((p-del-.06)/(1-del),0,1)
    const ep=ease(sp,E.io)
    const R0=q(.42),R1=q(.16)
    const R=lr(R0,R1,ep)
    const wobble=Math.sin(T*1.6+i)*q(.014)*(1-ep)
    const sx=cx+Math.cos(s.ang)*(R+wobble)
    const sy=cy+Math.sin(s.ang)*(R+wobble)*.88
    const sz=q(.1)*(1-ep*.28)
    const a=ease(sp)

    // comet trail
    if(ep>.04&&ep<.88){
      for(let d=1;d<=5;d++){
        const tr=lr(R0,R1,Math.max(0,ep-d*.055))
        const tx=cx+Math.cos(s.ang)*tr,ty=cy+Math.sin(s.ang)*tr*.88
        ctx.save();ctx.globalAlpha=a*(6-d)*.06;arc(tx,ty,sz*.15,s.c);ctx.restore()
      }
    }

    s.fn(sx,sy,sz,a)

    // dashed connection when near hub
    if(ep>.8){
      const lp=ease((ep-.8)/.2)
      ctx.save();ctx.globalAlpha=lp*.22;ctx.setLineDash([q(.01),q(.007)])
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(cx+Math.cos(s.ang)*hr,cy+Math.sin(s.ang)*hr)
      ctx.strokeStyle=s.c;ctx.lineWidth=1.5;ctx.stroke();ctx.setLineDash([]);ctx.restore()
    }

    // flowing particle
    if(ep>.08&&ep<.86) fp(cx+Math.cos(s.ang)*R0,cy+Math.sin(s.ang)*R0*.88,cx+Math.cos(s.ang)*hr,cy+Math.sin(s.ang)*hr,T*1.4+i*.7,s.c)
  })

  // "3" counter
  if(p>.75){
    const np=ease((p-.75)/.25,E.el)
    num(cx,q(.14),'3',q(.082)*np,C.I,'900',np)
    chip(cx,q(.2),'entry points',q(.022),C.M,np*.8)
  }
}

/* ═══════════════════════════════════════
   ACT 1 — PARSE & CLASSIFY
   Single doc flies in → eaten by spinning hex →
   9 coloured signal dots explode outward like fireworks.
═══════════════════════════════════════ */
function a1(p){
  const cx=q(.5),cy=q(.47)

  // Doc flies in and shrinks into hex
  if(p<.38){
    const dp=ease(p/.35,E.io)
    const s=q(.12)*(1-dp*.85)
    doc(lr(q(.1),cx-s/2,dp),lr(q(.18),cy-s*.62,dp),s,s*.78,1-p*2.4)
  }

  // AI hex spins up
  const hr=q(.14)*ease(cl(p-.04,.0,1)/.5,E.el)
  if(hr>0){
    hex(cx,cy,hr,T*1.2,ease(cl(p-.04,0,1)/.5),C.I)
    // glow rings while processing
    ;[q(.2),q(.27)].forEach((r,i)=>{
      ring(cx,cy,r*(hr/q(.14)),C.I,.1+Math.sin(T*3+i)*.04,1.5)
    })
  }

  // Signal dots burst out — each a different colour
  const tags=[
    {c:C.G, ang:  π*.05, lbl:'brand'},
    {c:C.Iv,ang:  π*.4,  lbl:'type'},
    {c:C.A, ang:  π*.75, lbl:'colour'},
    {c:C.P, ang:  π,     lbl:'print'},
    {c:C.B, ang:  π*1.25,lbl:'feature'},
    {c:C.Gt,ang:  π*1.6, lbl:'season'},
    {c:C.Bs,ang: -π*.25, lbl:'price'},
    {c:C.Ao,ang: -π*.55, lbl:'size'},
    {c:C.Pr,ang: -π*.85, lbl:'occasion'},
  ]

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
const FNS=[a0,a1,a2,a3,a4,a5,a6,a7]
const LBLS=['Trigger','Parse','Catalogue','Intelligence','Content Engine','Output','Review','Publish']
const LCOLS=[C.G,C.I,C.Iv,C.A,C.I,C.B,C.M,C.G]

// build dots
const dotsEl=document.getElementById('dots')
for(let i=0;i<N;i++){
  const d=document.createElement('div')
  d.className='dot';d.id='d'+i;d.onclick=()=>goTo(i)
  dotsEl.appendChild(d)
}

function uiSync(){
  for(let i=0;i<N;i++){
    document.getElementById('d'+i).className='dot'+(i===aI?' on':i<aI?' done':'')
  }
  const sl=document.getElementById('steplbl')
  sl.textContent=LBLS[aI];sl.style.color=LCOLS[aI]
}

function render(ts){
  if(!lastTs) lastTs=ts
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts
  if(playing){
    T+=dt
    const raw=T/(DUR*N)
    gT=cl(raw,0,1)
    const na=Math.min(Math.floor(raw*N),N-1)
    if(na!==aI){aI=na;uiSync()}
    aT=cl((raw*N)%1,0,1)
    document.getElementById('pf').style.width=(gT*100)+'%'
    if(gT>=1){
      playing=false
      document.getElementById('play').textContent='↺ Replay'
      document.getElementById('play').classList.remove('h')
    }
  }
  ctx.clearRect(0,0,Q,Q);bg();tickPts(dt)
  const F=.055
  if(aT<F&&aI>0){
    ctx.save();ctx.globalAlpha=ease(1-aT/F);FNS[aI-1](1);ctx.restore()
    ctx.save();ctx.globalAlpha=ease(aT/F);FNS[aI](0);ctx.restore()
  } else FNS[aI](aT)
  requestAnimationFrame(render)
}

function goTo(i){aI=i;aT=0;T=i*DUR;uiSync()}

function togglePlay(){
  const btn=document.getElementById('play')
  if(playing){playing=false;btn.textContent='▶ Play'}
  else{
    if(T>=DUR*N-.5) T=0
    playing=true;btn.textContent='❙❙ Pause'
    btn.classList.add('h');lastTs=null
  }
}

window.addEventListener('load',()=>{resize();uiSync();bg();FNS[0](0);playing=true;document.getElementById('play').classList.add('h');requestAnimationFrame(render)})
window.addEventListener('resize',()=>{resize();ctx.clearRect(0,0,Q,Q);bg()})
</script>
